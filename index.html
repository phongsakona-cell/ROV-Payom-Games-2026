<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Esports Scoreboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: transparent;
  color: white;
}

/* 🔥 HEADER ESPORT */
.header {
  width: 900px;
  margin-bottom: 15px;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(90deg, #0f172a, #1e293b, #0f172a);
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
  position: relative;
}

.header::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 200%;
  height: 3px;
  background: linear-gradient(90deg, transparent, #00f0ff, transparent);
  animation: glowMove 3s linear infinite;
}

@keyframes glowMove {
  0% { left: -100%; }
  100% { left: 100%; }
}

.header-inner {
  padding: 12px;
  text-align: center;
}

.tournament-name {
  font-size: 26px;
  font-weight: bold;
  color: #00f0ff;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
}

.sub-title {
  font-size: 12px;
  color: #aaa;
  margin-top: 3px;
  letter-spacing: 1px;
}

/* 📊 layout */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  width: 900px;
}

/* กล่อง group */
.group {
  background: #1f1f1f;
  border-radius: 10px;
  padding: 10px;
}

/* title */
h3 {
  text-align: center;
  margin: 5px 0;
}

/* table */
table {
  border-collapse: collapse;
  width: 100%;
}

/* header */
th {
  background: #333;
  color: #fff;
  padding: 6px;
}

/* cell */
td {
  padding: 6px;
  text-align: center;
  background: #2a2a2a;
  color: #ddd;
}

/* แถวสลับ */
tr:nth-child(even) td {
  background: #262626;
}

/* 🥇 อันดับ 1 */
tbody tr:nth-child(1) td {
  background: linear-gradient(90deg, #dbb600, #dbb600);
  color: black;
  font-weight: bold;
}

/* 🥈 อันดับ 2 */
tbody tr:nth-child(2) td {
  background: linear-gradient(90deg, #dbb600, #dbb600);
  color: black;
  font-weight: bold;
}

/* hover */
tr:hover td {
  background: #3a3a3a;
}
</style>

</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="tournament-name">PAYOM GAMES 2026 (ROV ROUND ROBIN)</div>
    <div class="sub-title">LIVE SCOREBOARD</div>
  </div>
</div>

<!-- 📊 TABLE -->
<div class="container" id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyTgKrtVEd2SlO3TkgWiGtxSbO3GXPUNRAjzZSiwYRi2uYnKTPrlUD83712ck3shhWuoA/exec"; // 🔥 ใส่ API ของคุณ

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    let html = "";

    json.data.forEach(group => {

      html += `
      <div class="group">
        <h3>${group.group}</h3>
        <table>
          <thead>
            <tr>
              <th>Team</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>GD</th>
              <th>TP</th>
            </tr>
          </thead>
          <tbody>
      `;

      group.teams.forEach(team => {
        html += `
        <tr>
          <td style="text-align:left; padding-left:10px;">
            ${team.team_name}
          </td>
          <td>${team.win}</td>
          <td>${team.draw}</td>
          <td>${team.loss}</td>
          <td>${team.goal_diff}</td>
          <td>${team.points}</td>
        </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  } catch (err) {
    console.error("โหลด API ไม่ได้", err);
  }
}

/* 🔄 realtime */
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
